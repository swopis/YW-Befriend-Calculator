<!DOCTYPE html>

<head>
	<title>Yokai Watch 2 Befriend Calculator</title>
<style>
input {
	padding: 10px;
	margin: 3px;
}
table, th, td {
	border: 1px solid black;
	table-layout: fixed;
}
</style>
</head>


<body>
	<h1>Yokai Watch 2 Befriend Calculator</h1>
	<h3>Global Bonuses</h3>
	<table>
		<tr>
			<td>
				<input type="checkbox" id="pop" onclick="calculate()" />
				<label for="pop">Popularity skill or superstar soul</label>
				<br />
				<input type="checkbox" id="unpop" onclick="calculate()" />
				<label for="unpop">Unpopularity skill</label>
				<br />
				<input type="checkbox" id="shrine" onclick="calculate()" />
				<label for="shrine">Shrine Bonus</label>
				<br />
			</td>
			<td>
				<input id="whisp_0" type="radio" name="whisp_%I" value="whisp_0" onclick="calculate()" checked />
				<label for="whisp_0">No heart whisp</label>
				<br />
				<input id="whisp_1" type="radio" name="whisp_%I" value="whisp_1" onclick="calculate()" />
				<label for="whisp_1">Blue heart whisp</label>
				<br />
				<input id="whisp_2" type="radio" name="whisp_%I" value="whisp_2" onclick="calculate()" />
				<label for="whisp_2">Golden heart whisp</label>
			</td>
		</tr>

	</table>
	<p>Enter either your yokai name with how often you already befriended it OR the difficulty id (1-8)</p>

	<div id="data"></div>

	<h2>Probabilities</h2>
	<ul id="result"></ul>

	<script src="build.js"></script>
	<script src="befriend.js"></script>
</body>
